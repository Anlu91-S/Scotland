<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#10231b">
  <meta name="description" content="Scotland Roadbook — a complete interactive road-trip planner from Glasgow to the Outer Hebrides and Edinburgh.">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon-192.png">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <link rel="stylesheet" href="./styles.css?v=530">
  <title>Scotland Roadbook</title>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div id="app-shell">
    <header class="topbar">
      <button class="brand" data-route="#home" aria-label="Scotland Roadbook home">
        <span class="brand-mark">SR</span>
        <span><strong>Scotland Roadbook</strong><small>04–20 AUGUST 2026</small></span>
      </button>
      <div class="top-actions">
        <button class="icon-button" data-route="#search" aria-label="Search">⌕</button>
        <button class="icon-button saved-button" data-route="#saved" aria-label="Saved items">♡<span id="saved-count">0</span></button>
        <button class="icon-button" data-route="#settings" aria-label="Settings">⚙</button>
      </div>
    </header>
    <main id="main" tabindex="-1"></main>
    <nav class="bottom-nav" aria-label="Main navigation">
      <button data-route="#home">Home</button>
      <button data-route="#itinerary">Route</button>
      <button data-route="#regions">Regions</button>
      <button data-route="#map">Map</button>
      <button data-route="#guide">Travel Guide</button>
    </nav>
  </div>
  <div id="toast-region" class="toast-region" aria-live="polite"></div>
  <div id="modal-root"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script type="module" src="./app.js?v=530"></script>
</body>
</html>
